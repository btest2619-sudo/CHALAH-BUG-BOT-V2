<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHALAH V2 - HYBRID LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Creepster&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #ff0000; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; display: inline-block; background: #0a0000; box-shadow: 0 0 20px #ff0000; }
        h1 { font-family: 'Nosifer', cursive; font-size: 18px; }
        #qr-box { margin: 20px 0; min-height: 200px; }
        #qr-img { width: 200px; border: 3px solid #fff; display: none; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #ff0000; color: #fff; text-align: center; }
        button { background: #ff0000; color: #000; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; width: 85%; font-family: 'Creepster'; font-size: 20px; }
        #code { margin-top: 15px; font-size: 30px; font-family: 'Nosifer'; color: #fff; text-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>
    <div class="box">
        <h1>CHALAH BUG BOT V2</h1>
        
        <div id="qr-box">
            <p>--- SCAN QR CODE ---</p>
            <div id="loading">Generating QR...</div>
            <img id="qr-img" src="" alt="QR">
        </div>

        <p>--- OR USE PAIRING CODE ---</p>
        <input type="text" id="num" placeholder="947xxxxxxxx">
        <button onclick="getCode()">GET CODE</button>
        <div id="code"></div>
    </div>

    <script>
        // QR එක auto reload වෙන ක්‍රමය
        async function fetchQR() {
            try {
                const res = await fetch('/qr');
                const data = await res.json();
                if (data.image) {
                    document.getElementById('qr-img').src = data.image;
                    document.getElementById('qr-img').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (e) {}
        }
        setInterval(fetchQR, 5000); // තත්පර 5කට වරක් QR එක අලුත් කරයි

        async function getCode() {
            const n = document.getElementById('num').value;
            const c = document.getElementById('code');
            if(!n) return alert("Number Required!");
            c.innerHTML = "WAIT...";
            const res = await fetch(`/pair?number=${n}`);
            const data = await res.json();
            c.innerHTML = data.code || "ERROR";
        }
    </script>
</body>
</html>
