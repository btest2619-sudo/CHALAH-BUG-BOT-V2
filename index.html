<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID 404 - PAIRING</title>
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Creepster&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { border: 2px solid #ff0000; padding: 30px; border-radius: 15px; box-shadow: 0 0 25px #ff0000; width: 85%; max-width: 400px; background: rgba(10,0,0,0.9); }
        h1 { font-family: 'Nosifer', cursive; font-size: 22px; text-shadow: 0 0 10px #ff0000; }
        img { width: 120px; border-radius: 50%; border: 2px solid #ff0000; margin-bottom: 15px; }
        input { width: 90%; padding: 12px; margin: 15px 0; background: #111; border: 1px solid #ff0000; color: #fff; text-align: center; font-size: 18px; border-radius: 5px; }
        button { background: #ff0000; color: #000; padding: 12px 25px; border: none; font-weight: bold; cursor: pointer; font-family: 'Creepster', cursive; font-size: 22px; width: 100%; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        #code { margin-top: 20px; font-size: 35px; color: #fff; font-family: 'Nosifer'; text-shadow: 0 0 15px #ff0000; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://files.catbox.moe/90yqxb.png" alt="Logo">
        <h1>CHALAH BUG BOT 404</h1>
        <p style="font-family: 'Creepster'; font-size: 18px;">ENTER NUMBER WITH COUNTRY CODE</p>
        <input type="text" id="num" placeholder="947xxxxxxxx">
        <button onclick="getCode()">GET CODE</button>
        <div id="code"></div>
    </div>
    <script>
        async function getCode() {
            const n = document.getElementById('num').value;
            const c = document.getElementById('code');
            if(!n) return alert("Number Required!");
            c.innerHTML = "WAIT...";
            try {
                const res = await fetch(`/pair?number=${n}`);
                const data = await res.json();
                c.innerHTML = data.code || "ERROR";
            } catch(e) { c.innerHTML = "ERROR"; }
        }
    </script>
</body>
</html>
